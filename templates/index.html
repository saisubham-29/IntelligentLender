<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelli-Credit | AI Credit Decisioning</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 30px; text-align: center; }
        .header h1 { color: #667eea; font-size: 2.5em; margin-bottom: 10px; }
        .header p { color: #666; font-size: 1.1em; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { background: white; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .tab:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .tab.active { background: #667eea; color: white; }
        .content { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1em; transition: border 0.3s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #667eea; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn { background: #667eea; color: white; padding: 15px 40px; border: none; border-radius: 8px; font-size: 1.1em; font-weight: 600; cursor: pointer; transition: all 0.3s; box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3); }
        .btn:hover { background: #5568d3; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .result { margin-top: 30px; padding: 30px; border-radius: 10px; display: none; }
        .result.approve { background: #d4edda; border: 2px solid #28a745; }
        .result.reject { background: #f8d7da; border: 2px solid #dc3545; }
        .result h2 { margin-bottom: 20px; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .result-item { background: white; padding: 15px; border-radius: 8px; }
        .result-item label { font-weight: 600; color: #666; display: block; margin-bottom: 5px; }
        .result-item value { font-size: 1.5em; font-weight: 700; color: #333; }
        .alert { padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .alert.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { display: none; text-align: center; padding: 20px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .download-btn { background: #28a745; margin-top: 20px; }
        .download-btn:hover { background: #218838; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏦 Intelli-Credit</h1>
            <p>AI-Powered Credit Decisioning Engine for Indian Corporate Lending</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('quick')">Quick Decision</div>
            <div class="tab" onclick="switchTab('site')">Site Visit</div>
            <div class="tab" onclick="switchTab('interview')">Management Interview</div>
        </div>

        <div class="content">
            <div id="alert" class="alert"></div>

            <!-- Quick Decision Tab -->
            <div id="quick-tab" class="tab-content active">
                <h2 style="margin-bottom: 30px; color: #667eea;">Credit Application Assessment</h2>
                <form id="quick-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Application ID *</label>
                            <input type="text" name="applicant_id" required placeholder="APP-12345">
                        </div>
                        <div class="form-group">
                            <label>Company Name *</label>
                            <input type="text" name="company_name" required placeholder="ABC Manufacturing Pvt Ltd">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>CIN</label>
                            <input type="text" name="cin" placeholder="U12345MH2015PTC123456">
                        </div>
                        <div class="form-group">
                            <label>GSTIN</label>
                            <input type="text" name="gstin" placeholder="27AABCU9603R1ZM">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Industry</label>
                            <input type="text" name="industry" placeholder="Textile Manufacturing">
                        </div>
                        <div class="form-group">
                            <label>Credit Score</label>
                            <input type="number" name="credit_score" placeholder="720">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Annual Revenue (₹) *</label>
                            <input type="number" name="revenue" required placeholder="50000000">
                        </div>
                        <div class="form-group">
                            <label>Net Profit (₹) *</label>
                            <input type="number" name="net_profit" required placeholder="4000000">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Total Assets (₹) *</label>
                            <input type="number" name="total_assets" required placeholder="60000000">
                        </div>
                        <div class="form-group">
                            <label>Net Worth (₹) *</label>
                            <input type="number" name="net_worth" required placeholder="25000000">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Total Debt (₹) *</label>
                            <input type="number" name="total_debt" required placeholder="20000000">
                        </div>
                        <div class="form-group">
                            <label>Collateral Value (₹)</label>
                            <input type="number" name="collateral_value" placeholder="80000000">
                        </div>
                    </div>

                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <p style="margin-top: 15px; color: #667eea; font-weight: 600;">Processing application...</p>
                    </div>

                    <button type="submit" class="btn" id="submit-btn">Generate Credit Decision</button>
                </form>

                <div id="result" class="result">
                    <h2 id="result-title"></h2>
                    <div class="result-grid">
                        <div class="result-item">
                            <label>Credit Limit</label>
                            <value id="credit-limit"></value>
                        </div>
                        <div class="result-item">
                            <label>Risk Premium</label>
                            <value id="risk-premium"></value>
                        </div>
                        <div class="result-item">
                            <label>Approval Probability</label>
                            <value id="approval-prob"></value>
                        </div>
                        <div class="result-item">
                            <label>Default Probability</label>
                            <value id="default-prob"></value>
                        </div>
                    </div>
                    <button class="btn download-btn" id="download-btn">Download Full CAM Report</button>
                </div>
            </div>

            <!-- Site Visit Tab -->
            <div id="site-tab" class="tab-content">
                <h2 style="margin-bottom: 30px; color: #667eea;">Factory Site Visit</h2>
                <form id="site-form">
                    <div class="form-group">
                        <label>Capacity Utilization (%) *</label>
                        <input type="number" name="capacity_utilization" required min="0" max="100" placeholder="75">
                    </div>

                    <div class="form-group">
                        <label>Machinery Condition *</label>
                        <select name="machinery_condition" required>
                            <option value="">Select...</option>
                            <option value="Excellent">Excellent</option>
                            <option value="Good">Good</option>
                            <option value="Average">Average</option>
                            <option value="Poor">Poor</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Observations *</label>
                        <textarea name="observations" rows="5" required placeholder="Describe factory conditions, inventory levels, employee morale, safety compliance, etc."></textarea>
                    </div>

                    <button type="submit" class="btn">Record Site Visit</button>
                </form>
            </div>

            <!-- Management Interview Tab -->
            <div id="interview-tab" class="tab-content">
                <h2 style="margin-bottom: 30px; color: #667eea;">Management Interview</h2>
                <form id="interview-form">
                    <div class="form-group">
                        <label>Management Quality Rating (1-5) *</label>
                        <select name="quality_rating" required>
                            <option value="">Select...</option>
                            <option value="5">5 - Excellent</option>
                            <option value="4">4 - Good</option>
                            <option value="3">3 - Average</option>
                            <option value="2">2 - Below Average</option>
                            <option value="1">1 - Poor</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Red Flags (comma-separated)</label>
                        <input type="text" name="red_flags" placeholder="e.g., Vague about future plans, Inconsistent answers">
                    </div>

                    <div class="form-group">
                        <label>Interview Notes *</label>
                        <textarea name="notes" rows="5" required placeholder="Document management's understanding of business, succession planning, strategic vision, etc."></textarea>
                    </div>

                    <button type="submit" class="btn">Record Interview</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        let currentAppId = '';

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
        }

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert ' + type;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 5000);
        }

        document.getElementById('quick-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            currentAppId = data.applicant_id;
            
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            
            try {
                const response = await fetch('/api/quick_decision', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    const resultDiv = document.getElementById('result');
                    resultDiv.className = 'result ' + (result.decision === 'APPROVE' ? 'approve' : 'reject');
                    resultDiv.style.display = 'block';
                    
                    document.getElementById('result-title').textContent = 
                        result.decision === 'APPROVE' ? '✅ Application APPROVED' : '❌ Application REJECTED';
                    document.getElementById('credit-limit').textContent = '₹' + result.credit_limit.toLocaleString('en-IN');
                    document.getElementById('risk-premium').textContent = result.risk_premium + ' bps';
                    document.getElementById('approval-prob').textContent = result.approval_probability.toFixed(1) + '%';
                    document.getElementById('default-prob').textContent = result.default_probability.toFixed(2) + '%';
                    
                    showAlert('Credit decision generated successfully!', 'success');
                } else {
                    showAlert('Error generating decision', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            } finally {
                document.getElementById('submit-btn').disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        });

        document.getElementById('site-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                const response = await fetch('/api/add_site_visit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert(result.message, 'success');
                    e.target.reset();
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        });

        document.getElementById('interview-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                const response = await fetch('/api/add_interview', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert(result.message, 'success');
                    e.target.reset();
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        });

        document.getElementById('download-btn').addEventListener('click', () => {
            window.location.href = '/api/download_cam/' + currentAppId;
        });
    </script>
</body>
</html>
