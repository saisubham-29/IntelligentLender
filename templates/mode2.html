<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Credit Manager | Intelli-Credit</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 30px; }
        .header h1 { color: #f093fb; font-size: 2.5em; margin-bottom: 10px; }
        .back-btn { background: #6c757d; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 20px; text-decoration: none; display: inline-block; }
        .content { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; }
        .tab { padding: 15px 30px; border-radius: 8px; cursor: pointer; background: #f8f9fa; font-weight: 600; }
        .tab.active { background: #f093fb; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; }
        .btn { background: #f093fb; color: white; padding: 15px 40px; border: none; border-radius: 8px; font-size: 1.1em; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #e082ea; }
        .result { margin-top: 30px; padding: 30px; border-radius: 10px; background: #f8f9fa; display: none; }
        .loading { display: none; text-align: center; padding: 20px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #f093fb; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">← Back to Home</a>
        
        <div class="header">
            <h1>🔍 Digital Credit Manager</h1>
            <p>Conduct research and add primary insights</p>
        </div>

        <div class="content">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('research')">Secondary Research</div>
                <div class="tab" onclick="switchTab('sitevisit')">Site Visit</div>
                <div class="tab" onclick="switchTab('interview')">Management Interview</div>
            </div>

            <div id="research" class="tab-content active">
                <form id="researchForm">
                    <div class="form-group">
                        <label>Company Name</label>
                        <input type="text" name="company_name" required>
                    </div>
                    <div class="form-group">
                        <label>Promoters (comma-separated)</label>
                        <input type="text" name="promoters" placeholder="John Doe, Jane Smith">
                    </div>
                    <div class="form-group">
                        <label>Sector</label>
                        <input type="text" name="sector" placeholder="NBFC, Manufacturing, etc.">
                    </div>
                    <div class="form-group">
                        <label>CIN</label>
                        <input type="text" name="cin">
                    </div>
                    <button type="submit" class="btn">Conduct Research</button>
                </form>
            </div>

            <div id="sitevisit" class="tab-content">
                <form id="siteVisitForm">
                    <div class="form-group">
                        <label>Capacity Utilization (%)</label>
                        <input type="number" name="capacity_utilization" min="0" max="100" required>
                    </div>
                    <div class="form-group">
                        <label>Machinery Condition</label>
                        <select name="machinery_condition" required>
                            <option value="excellent">Excellent</option>
                            <option value="good">Good</option>
                            <option value="average">Average</option>
                            <option value="poor">Poor</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Observations</label>
                        <textarea name="observations" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn">Submit Site Visit</button>
                </form>
            </div>

            <div id="interview" class="tab-content">
                <form id="interviewForm">
                    <div class="form-group">
                        <label>Management Quality (1-10)</label>
                        <input type="number" name="quality_rating" min="1" max="10" required>
                    </div>
                    <div class="form-group">
                        <label>Red Flags (comma-separated)</label>
                        <input type="text" name="red_flags" placeholder="Evasive answers, Inconsistent data">
                    </div>
                    <div class="form-group">
                        <label>Notes</label>
                        <textarea name="notes" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn">Submit Interview</button>
                </form>
            </div>

            <div class="loading">
                <div class="spinner"></div>
                <p>Processing...</p>
            </div>

            <div class="result" id="result"></div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab).classList.add('active');
        }

        document.getElementById('researchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            document.querySelector('.loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            
            const response = await fetch('/api/mode2/research', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            document.querySelector('.loading').style.display = 'none';
            
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <h2>🔍 Research Results</h2>
                <p><strong>Risk Score:</strong> ${result.research_risk_score}/100</p>
                <h3>Key Findings</h3>
                <ul>${result.key_findings.map(f => '<li>' + f + '</li>').join('')}</ul>
                <h3>Research Summary</h3>
                <p>${result.research_summary}</p>
            `;
        });

        document.getElementById('siteVisitForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            const response = await fetch('/api/mode2/site_visit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            alert(result.message);
        });

        document.getElementById('interviewForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            const response = await fetch('/api/mode2/interview', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            alert(result.message);
        });
    </script>
</body>
</html>
